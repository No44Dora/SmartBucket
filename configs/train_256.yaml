# 模型结构配置（按需求固定为 32/64/128/256 + bottleneck 512）
model:
  in_channels: 1      # 单通道线稿输入

# 损失函数配置
loss:
  lambda_interior: 1.0
  lambda_seed: 1.0
  alpha: 3.0          # weighted MSE 的中心区域权重系数

# 优化器配置
optim:
  lr: 0.001

data:
  root: processed/train
  image_size: 512
  batch_size: 2
  num_workers: 4
  pin_memory: true

train:
  epochs: 120
  output_dir: outputs/checkpoints

test:
  root: processed/test
  vis_dir: outputs/eval_vis

postprocess:
  interior_threshold: 0.5
  smooth_kernel_size: 7
  smooth_sigma: 1.5
  peak_threshold: 0.4
  min_distance: 12
  min_area: 120

# 使用说明
# 1) 直接使用默认配置启动训练：
#    python scripts/train.py --config configs/train_256.yaml
# 2) 训练完成后会保存 latest/best checkpoint 到 train.output_dir。
# 3) 测试并导出可视化：
#    python scripts/evaluate.py --config configs/train_256.yaml --ckpt outputs/checkpoints/best.pth --device cpu
